spring:
  application:
    name: multi-agent-library

  datasource:
    url: jdbc:mysql://localhost:3306/library_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

  # RabbitMQ配置(设置为false可禁用RabbitMQ,使用直接通知方式)
  rabbitmq:
    enabled: false  # 暂时禁用RabbitMQ,避免启动报错
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /
    listener:
      simple:
        acknowledge-mode: manual  # 手动确认模式
        prefetch: 1  # 每次只拉取一条消息
        retry:
          enabled: true  # 开启重试
          max-attempts: 3  # 最大重试次数
          initial-interval: 60000  # 初始重试间隔1分钟
          multiplier: 2.0  # 重试间隔乘数(指数退避,每次重试间隔翻倍)

# MyBatis-Plus配置
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl  # 开发时打印SQL
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto  # 数据库自增ID
      logic-delete-field: deleted  # 软删除字段（如需要）
      logic-delete-value: 1
      logic-not-delete-value: 0

# JADE配置
jade:
  host: localhost
  port: 1099
  gui: true  # 是否启动JADE GUI（调试时用）
  agents: >
    demand:com.library.agent.UserDemandAgent;
    lib1:com.library.agent.InventoryAgent(1,理科馆);
    lib2:com.library.agent.InventoryAgent(2,文科馆);
    lib3:com.library.agent.InventoryAgent(3,工程馆);
    balance:com.library.agent.InventoryBalanceAgent

server:
  port: 8080